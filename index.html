<script>
var Chars = ["9", "8", "7", "6", "5", "4", "0", "3", "1", "3", "六", "2"];
var Cells = [];
var tileSize = 14;
var columns = 0;
var matrixContainer = null;

function setup() {
    matrixContainer = document.getElementById('matrix-layer');
    var cnv = createCanvas(window.innerWidth, window.innerHeight);
    cnv.parent('matrix-layer');
    clear();
    noStroke();
    frameRate(60); // 전체 프레임은 빠르게
    textFont("Verdana");
    textAlign(CENTER, CENTER);
    textSize(tileSize);

    columns = floor(width / tileSize);
    initMatrix();
}

function initMatrix(){
    Cells = [];
    for(var i = 0; i < columns; i++){
        var x = i * tileSize + tileSize/2;
        var startY = random(-200, height);
        Cells.push(new MatrixColumn(x, startY));
    }
}

function draw(){
    clear();
    for(var i = 0; i < Cells.length; i++){
        Cells[i].update();
        Cells[i].draw();
    }
}

// ===== MatrixColumn 수정 (세로 tail + 글자 바뀌는 속도 10프레임) =====
function MatrixColumn(x, startY) {
    this.x = x;
    this.y = startY;
    this.speed = random(0, 3);  // 랜덤 내려오는 속도        // 내려오는 속도
    this.tailLength = floor(random(10, 24)); // tail 길이
    this.frameCount = 0;      // 글자 변경용 카운트
    this.charIndexes = [];    // tail 글자 저장

    // tail 초기화
    for (let i = 0; i < this.tailLength; i++) {
        this.charIndexes.push(floor(random(Chars.length)));
    }

    this.update = function() {
        this.y += this.speed;
        if(this.y > height + this.tailLength * tileSize){
            this.y = random(-200, -50);
        }

        // 글자 바꾸는 속도 10프레임
        this.frameCount++;
        if(this.frameCount >= 19){
            for(let i = 0; i < this.tailLength; i++){
                this.charIndexes[i] = floor(random(Chars.length));
            }
            this.frameCount = 0;
        }
    }

    this.draw = function() {
        for(let i = 0; i < this.tailLength; i++){
            fill(0, 255, 70, 255 - i * (255 / this.tailLength)); // tail 점점 흐려지게
            text(Chars[this.charIndexes[i]], this.x, this.y - i * tileSize);
        }
    }
}

function windowResized(){
    resizeCanvas(window.innerWidth, window.innerHeight);
    columns = floor(width / tileSize);
    initMatrix();
}
</script>

<!-- 언어 선택 및 구글 번역 스크립트 유지 -->
<script>
// 언어 선택
const dropdown = document.getElementById("lang-dropdown");
const btn = document.getElementById("auto-lang-btn");

btn.onclick = () => {
    dropdown.classList.toggle("open");
};

document.querySelectorAll(".lang-item").forEach(item => {
    item.onclick = () => {
        const lang = item.getAttribute("data-lang");
        const interval = setInterval(() => {
            const select = document.querySelector(".goog-te-combo");
            if(select){
                select.value = lang;
                select.dispatchEvent(new Event("change"));
                clearInterval(interval);
            }
        }, 200);
        dropdown.classList.remove("open");
    };
});

// 외부 클릭 시 닫기
document.addEventListener("click", function(e){
    if(!dropdown.contains(e.target)){
        dropdown.classList.remove("open");
    }
});
</script>

<script>
function googleTranslateElementInit(){
    new google.translate.TranslateElement(
        {pageLanguage:'ko',includedLanguages:'ko,en,ja,zh-CN,zh-TW,vi,mn,es,fr,de,it,nl,ru'},
        'google_translate_element'
    );
}

function removeGoogleUI(){
    const banner = document.querySelector('.goog-te-banner-frame');
    if(banner){banner.remove();}
    const frame = document.querySelector('iframe.goog-te-banner-frame');
    if(frame){frame.remove();}
    const tooltip = document.querySelector('#goog-gt-tt');
    if(tooltip){tooltip.remove();}
    const highlight = document.querySelectorAll('.goog-text-highlight');
    highlight.forEach(el => { el.style.background="none"; });
    document.body.style.top="0px";
}
setInterval(removeGoogleUI,100);
</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
